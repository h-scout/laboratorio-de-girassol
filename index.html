<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Laboratório de Probabilidade do Girassol</title>

<style>
body{
font-family:Arial;
background:#0b0f1a;
color:white;
text-align:center;
padding:30px;
}

h1{
color:#ffd700;
}

.container{
background:#111827;
padding:20px;
border-radius:10px;
max-width:600px;
margin:auto;
}

input{
padding:8px;
margin:5px;
width:120px;
}

button{
padding:10px;
background:#22c55e;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:20px;
text-align:left;
background:#020617;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<h1>🌻 Laboratório de Probabilidade do Girassol</h1>

<div class="container">

<p>Digite os dados do seu girassol</p>

<input id="altura" placeholder="Altura (cm)">
<input id="dias" placeholder="Dias de vida">
<input id="vaso" placeholder="Vaso (ml)">

<br>

<button onclick="analisar()">Analisar Planta</button>

<div class="result" id="resultado"></div>

</div>

<script>

function fasePlanta(dias){

if(dias <= 7) return "Germinação";

if(dias <= 40) return "Vegetativa";

if(dias <= 65) return "Pré-Floração";

if(dias <= 90) return "Floração";

return "Maturação / Morte próxima";

}

function alturaEsperada(vaso){

if(vaso <= 250) return 40;

if(vaso <= 500) return 60;

if(vaso <= 1000) return 100;

if(vaso <= 3000) return 150;

return 200;

}

function analisar(){

let altura = parseFloat(document.getElementById("altura").value);
let dias = parseFloat(document.getElementById("dias").value);
let vaso = parseFloat(document.getElementById("vaso").value);

let crescimento = (altura / dias).toFixed(2);

let fase = fasePlanta(dias);

let maxAltura = alturaEsperada(vaso);

let progresso = ((altura / maxAltura) * 100).toFixed(1);

let diasFlor = 70 - dias;

let raizLimitada = vaso < 300 ? "Alta probabilidade" : "Baixa probabilidade";

let probCrescimento = Math.max(0,(100 - progresso)).toFixed(1);

let texto = `

Altura atual: ${altura} cm

Idade: ${dias} dias

Volume do vaso: ${vaso} ml

----------------------------------

Crescimento médio diário:
${crescimento} cm/dia

----------------------------------

Fase da planta:
${fase}

----------------------------------

Altura máxima provável no vaso:
${maxAltura} cm

----------------------------------

Progresso do crescimento:
${progresso} %

----------------------------------

Probabilidade de continuar crescendo:
${probCrescimento} %

----------------------------------

Dias estimados para início da floração:
${diasFlor > 0 ? diasFlor : "já iniciou"}

----------------------------------

Risco de limitação de raiz:
${raizLimitada}

`;

document.getElementById("resultado").innerText = texto;

}

</script>

</body>
</html>
